<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soccer Pucks</title>
<link rel="stylesheet" href="css/style.css?v=local-teams-1" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="game-canvas" tabindex="-1"></canvas>

<div id="hud" class="hidden">
  <div id="power-bar"><div id="power-fill"></div></div>
  <div id="banner" class="hidden"></div>
</div>

<div id="menu">
  <h1>SOCCER PUCKS</h1>
  <p class="subtitle">3D arcade ball - pick your hero</p>
  <label id="nickname-field">
    <span>Nickname</span>
    <input id="nickname-input" type="text" maxlength="16" spellcheck="false" autocomplete="off" />
  </label>
  <div id="hero-pick">
    <button class="hero-btn selected" data-hero="sam">
      <span class="hero-name">Sam</span>
      <span class="hero-power">Power: Dash</span>
    </button>
    <button class="hero-btn" data-hero="tesla">
      <span class="hero-name">Tesla</span>
      <span class="hero-power">Power: Magnet</span>
    </button>
  </div>
  <div id="mode-actions">
    <button id="start-btn" class="primary-btn">Local Play</button>
    <button id="host-btn" class="secondary-btn">Host Online</button>
    <button id="join-btn" class="secondary-btn">Join Online</button>
  </div>
  <div id="local-panel" class="hidden">
    <div class="online-header">
      <strong id="local-title">Local Match</strong>
      <span id="local-status">Choose format and heroes</span>
    </div>
    <div id="local-format" class="setup-row">
      <span id="local-format-label">Format</span>
      <div id="local-size-pick" role="group" aria-labelledby="local-format-label">
        <button class="match-size-btn selected" type="button" data-local-size="1" aria-pressed="true">
          <span class="match-size-count">1x1</span>
          <span class="match-size-meta">Solo vs AI</span>
        </button>
        <button class="match-size-btn" type="button" data-local-size="2" aria-pressed="false">
          <span class="match-size-count">2x2</span>
          <span class="match-size-meta">AI teammate</span>
        </button>
      </div>
    </div>
    <div id="local-teams">
      <section class="local-team red" aria-label="Red team">
        <div class="local-team-header">
          <span class="local-team-name">Red Team</span>
          <span class="local-team-side">Your Side</span>
        </div>
        <div id="local-red-roster" class="local-team-roster"></div>
      </section>
      <div id="local-versus">VS</div>
      <section class="local-team blue" aria-label="Blue team">
        <div class="local-team-header">
          <span class="local-team-name">Blue Team</span>
          <span class="local-team-side">Opponents</span>
        </div>
        <div id="local-blue-roster" class="local-team-roster"></div>
      </section>
    </div>
    <div class="online-actions">
      <button id="start-local-btn" class="tiny-btn">Start Match</button>
      <button id="cancel-local-btn" class="tiny-btn danger-btn">Cancel</button>
    </div>
  </div>
  <div id="online-panel" class="hidden">
    <div class="online-header">
      <strong id="online-title">Online</strong>
      <span id="online-status">Idle</span>
    </div>
    <label class="online-field" id="primary-code-field">
      <span id="primary-code-label">Room Code</span>
      <span class="online-code-row">
        <button id="copy-primary-btn" class="tiny-btn hidden" type="button">Copy Room</button>
        <input id="primary-code" type="text" maxlength="6" spellcheck="false" autocomplete="off" />
      </span>
    </label>
    <div id="lobby-roster" class="lobby-roster hidden"></div>
    <div class="online-actions">
      <button id="start-online-btn" class="tiny-btn hidden" disabled>Start Match</button>
      <button id="join-room-btn" class="tiny-btn hidden">Join Room</button>
      <button id="cancel-online-btn" class="tiny-btn danger-btn">Cancel</button>
    </div>
  </div>
  <p class="controls-hint">WASD / Arrows to move &nbsp;&middot;&nbsp; Space to shoot &nbsp;&middot;&nbsp; Shift for power</p>
</div>

<div id="loading" class="hidden">Loading stadium...</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
